name = "riding-path-push"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cron times are in UTC. These approximate 09:00 / 19:00 Europe/Warsaw time
# in winter (CET, UTC+1). In summer (CEST, UTC+2) reminders will land an
# hour later (10:00 / 20:00). Adjust the two values below if you want exact
# local times, or just leave it — it's close enough for a reminder.
[triggers]
crons = ["0 8 * * *", "0 18 * * *"]

# VAPID public key + subject are not secret — fine to commit.
# VAPID_PRIVATE_KEY must NOT go here; it's set with:
#   npm run secret:vapid-private
[vars]
VAPID_SUBJECT = "mailto:racozier@gmail.com"
VAPID_PUBLIC_KEY = "BFa4SAbtmScNARjp-_PyLO5PqDxX8_tQTs4FFqBKt_99W2TCkpJtq8AGNCjrQvMrxMi4yQTQMrzxQt-mvAXjqZo"

# Replace `id` below with the id printed by `npm run kv:create`.
[[kv_namespaces]]
binding = "DEVICES"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
